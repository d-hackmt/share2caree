<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ShareToCare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body
    style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-main);">
    <div class="card animate-fade-in" style="width: 100%; max-width: 450px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo"
                style="justify-content: center; font-size: 2rem;">ShareTo<span>Care</span></a>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Welcome back! Please login to your account.</p>
        </div>

        <form action="#" onsubmit="event.preventDefault(); window.location.href='donor/dashboard.html';">
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label class="form-label">Password</label>
                    <a href="#" style="font-size: 0.875rem; color: var(--primary-blue); margin-bottom: 0.5rem;">Forgot
                        password?</a>
                </div>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label class="form-label">Continue as</label>
                <select class="form-control">
                    <option value="donor">Donor (Individual/Company)</option>
                    <option value="ngo">NGO (Charity Organization)</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; justify-content: center; margin-top: 1rem;">
                Login to Dashboard
            </button>
        </form>

        <div
            style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.875rem;">
                Don't have an account?
                <a href="register-donor.html" style="color: var(--primary-blue); font-weight: 600;">Register here</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
