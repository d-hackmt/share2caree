<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Donation | ShareToCare</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="background-color: var(--bg-main);">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="../index.html" class="logo"
                style="margin-bottom: 2.5rem; padding: 0 1rem;">ShareTo<span>Care</span></a>
            <nav style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                <a href="dashboard.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="add-donation.html" class="btn"
                    style="background: var(--primary-blue-light); color: var(--primary-blue); justify-content: flex-start;">
                    <i data-lucide="plus-circle"></i> Add Donation
                </a>
                <a href="my-donations.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="package"></i> My Donations
                </a>
                <a href="history.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="history"></i> History
                </a>
                <a href="profile.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="user"></i> Profile
                </a>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <a href="../login.html" class="btn" style="justify-content: flex-start; color: #ef4444; width: 100%;">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header style="margin-bottom: 2.5rem;">
                <h1 style="font-size: 1.875rem;">Add New Donation</h1>
                <p style="color: var(--text-muted);">Fill in the details about the item you'd like to donate.</p>
            </header>

            <div class="card" style="max-width: 800px;">
                <!-- Multi-step indicator (Visual only) -->
                <div
                    style="display: flex; gap: 2rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                    <div
                        style="display: flex; align-items: center; gap: 0.5rem; color: var(--primary-blue); font-weight: 700;">
                        <span
                            style="width: 24px; height: 24px; border-radius: 50%; background: var(--primary-blue); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.75rem;">1</span>
                        Item Details
                    </div>
                    <div style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted);">
                        <span
                            style="width: 24px; height: 24px; border-radius: 50%; background: var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 0.75rem;">2</span>
                        Location
                    </div>
                    <div style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted);">
                        <span
                            style="width: 24px; height: 24px; border-radius: 50%; background: var(--border-color); display: flex; align-items: center; justify-content: center; font-size: 0.75rem;">3</span>
                        Photos
                    </div>
                </div>

                <form onsubmit="event.preventDefault(); window.location.href='my-donations.html';">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">Item Title</label>
                            <input type="text" class="form-control" placeholder="e.g., Winter Jackets for Kids"
                                required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select class="form-control" required>
                                <option value="">Select Category</option>
                                <option value="food">Food</option>
                                <option value="clothes">Clothes</option>
                                <option value="books">Books</option>
                                <option value="games">Games</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label">Quantity</label>
                            <input type="text" class="form-control" placeholder="e.g., 5 units / 10 kg" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Condition</label>
                            <select class="form-control" required>
                                <option value="new">New</option>
                                <option value="like-new">Like New</option>
                                <option value="good">Good / Used</option>
                                <option value="fair">Fair</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" rows="4"
                            placeholder="Tell more about the donation..."></textarea>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Pickup Address</label>
                        <input type="text" class="form-control" placeholder="Complete address for NGO pickup" required>
                    </div>

                    <div
                        style="background: var(--bg-main); border: 2px dashed var(--border-color); border-radius: var(--radius-md); padding: 3rem; text-align: center; margin-bottom: 2rem;">
                        <i data-lucide="upload-cloud"
                            style="width: 48px; height: 48px; color: var(--text-muted); margin-bottom: 1rem;"></i>
                        <p style="font-weight: 600;">Click to upload images</p>
                        <p style="color: var(--text-muted); font-size: 0.875rem;">PNG, JPG up to 10MB</p>
                        <input type="file" style="display: none;" id="file-upload">
                        <button type="button" onclick="document.getElementById('file-upload').click()"
                            class="btn btn-outline" style="margin-top: 1.5rem;">
                            Choose Files
                        </button>
                    </div>

                    <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                        <button type="button" class="btn btn-outline"
                            onclick="window.location.href='dashboard.html'">Cancel</button>
                        <button type="submit" class="btn btn-primary">Post Donation</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
