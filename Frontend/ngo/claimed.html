<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Claimed Items | ShareToCare</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="background-color: var(--bg-main);">
    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="../index.html" class="logo" style="margin-bottom: 2.5rem; padding: 0 1rem;">ShareTo<span>Care</span></a>
            <nav style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                <a href="dashboard.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="browse.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="search"></i> Browse Donations
                </a>
                <a href="claimed.html" class="btn" style="background: var(--primary-green-light); color: var(--primary-green); justify-content: flex-start;">
                    <i data-lucide="check-square" style="color: var(--primary-green);"></i> My Claimed Items
                </a>
                <a href="history.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="history"></i> History
                </a>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <a href="../login.html" onclick="localStorage.clear()" class="btn" style="justify-content: flex-start; color: #ef4444; width: 100%;">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2.5rem;">
                <h1 style="font-size: 1.875rem;">My Claimed Items</h1>
                <p style="color: var(--text-muted);">Donations your organization has claimed.</p>
            </header>

            <div id="claimedGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
                <p style="color: var(--text-muted);">Loading claimed items...</p>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'NGO') {
            window.location.href = '../login.html';
        }

        const categoryIcon = (cat) => {
            if (!cat) return 'package';
            const c = cat.toUpperCase();
            if (c === 'FOOD') return 'apple';
            if (c === 'CLOTHES') return 'shirt';
            if (c === 'BOOKS') return 'book-open';
            return 'package';
        };

        const formatDate = (dt) => {
            if (!dt) return '';
            return new Date(dt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        const loadClaimed = async () => {
            const grid = document.getElementById('claimedGrid');
            try {
                const res = await fetch(`http://localhost:8080/api/donations/ngo/${currentUser.id}`);
                const items = await res.json();

                if (!items.length) {
                    grid.innerHTML = '<p style="color: var(--text-muted);">You have not claimed any donations yet. <a href="browse.html" style="color: var(--primary-green);">Browse available donations.</a></p>';
                    return;
                }

                grid.innerHTML = items.map(d => `
                    <div class="card" style="padding: 0; overflow: hidden;">
                        <div style="height: 140px; background: #f0fdf4; display: flex; align-items: center; justify-content: center;">
                            <i data-lucide="${categoryIcon(d.category)}" style="width: 48px; height: 48px; color: var(--primary-green);"></i>
                        </div>
                        <div style="padding: 1.25rem;">
                            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;">
                                <h3 style="font-size: 1.1rem; margin: 0;">${d.title || 'Untitled Donation'}</h3>
                                <span class="badge badge-claimed">Claimed</span>
                            </div>
                            <div style="display: flex; gap: 0.75rem; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.75rem;">
                                <span><i data-lucide="tag" size="12" style="display:inline;"></i> ${d.category || 'General'}</span>
                                <span><i data-lucide="box" size="12" style="display:inline;"></i> ${d.quantity || 'N/A'}</span>
                            </div>
                            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.25rem;">
                                <i data-lucide="map-pin" size="13"></i> ${d.pickupAddress || 'No address provided'}
                            </p>
                            ${d.description ? `<p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">${d.description}</p>` : ''}
                            <p style="font-size: 0.75rem; color: var(--text-muted);">Condition: ${d.itemCondition || 'N/A'} &bull; Posted: ${formatDate(d.createdAt)}</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                grid.innerHTML = '<p style="color: red;">Failed to load claimed items. Is the backend running?</p>';
            }
        };

        loadClaimed();
    </script>
</body>
</html>
