<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Donations | ShareToCare</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="background-color: var(--bg-main);">
    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="../index.html" class="logo" style="margin-bottom: 2.5rem; padding: 0 1rem;">ShareTo<span>Care</span></a>
            <nav style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                <a href="dashboard.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="browse.html" class="btn" style="background: var(--primary-green-light); color: var(--primary-green); justify-content: flex-start;">
                    <i data-lucide="search" style="color: var(--primary-green);"></i> Browse Donations
                </a>
                <a href="claimed.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="check-square"></i> My Claimed Items
                </a>
                <a href="history.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="history"></i> History
                </a>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <a href="../login.html" onclick="localStorage.clear()" class="btn" style="justify-content: flex-start; color: #ef4444; width: 100%;">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2.5rem;">
                <h1 style="font-size: 1.875rem;">Browse Available Donations</h1>
                <p style="color: var(--text-muted);">Find items that your organization can use.</p>
            </header>

            <!-- Filters -->
            <div class="card" style="margin-bottom: 2rem; padding: 1.25rem;">
                <div style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center;">
                    <div style="flex: 1; min-width: 250px; position: relative;">
                        <i data-lucide="search" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);" size="18"></i>
                        <input id="searchInput" type="text" class="form-control" style="padding-left: 2.5rem;" placeholder="Search by title or address...">
                    </div>
                    <select id="categoryFilter" class="form-control" style="width: auto;">
                        <option value="">All Categories</option>
                        <option value="FOOD">Food</option>
                        <option value="CLOTHES">Clothes</option>
                        <option value="BOOKS">Books</option>
                        <option value="GAMES">Games</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
            </div>

            <div id="donationsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem;">
                <p style="color: var(--text-muted);">Loading donations...</p>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'NGO') {
            window.location.href = '../login.html';
        }

        let allDonations = [];

        const categoryIcon = (cat) => {
            if (!cat) return 'package';
            const c = cat.toUpperCase();
            if (c === 'FOOD') return 'apple';
            if (c === 'CLOTHES') return 'shirt';
            if (c === 'BOOKS') return 'book-open';
            return 'package';
        };

        const renderDonations = (donations) => {
            const grid = document.getElementById('donationsGrid');
            if (!donations.length) {
                grid.innerHTML = '<p style="color: var(--text-muted);">No available donations match your search.</p>';
                return;
            }
            grid.innerHTML = donations.map(d => `
                <div class="card" style="padding: 0; overflow: hidden; position: relative;">
                    <span class="badge badge-available" style="position: absolute; top: 1rem; right: 1rem;">Available</span>
                    <div style="height: 180px; background: #f1f5f9; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="${categoryIcon(d.category)}" style="width: 48px; height: 48px; color: var(--text-muted);"></i>
                    </div>
                    <div style="padding: 1.5rem;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem;">
                            <h3 style="font-size: 1.125rem;">${d.title || 'Untitled'}</h3>
                            <span class="badge" style="background: #eff6ff; color: var(--primary-blue); font-size: 0.7rem;">${d.category || 'General'}</span>
                        </div>
                        <p style="color: var(--text-muted); font-size: 0.875rem; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem;">
                            <i data-lucide="map-pin" size="14"></i> ${d.pickupAddress || 'No address'}
                        </p>
                        ${d.description ? `<p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 1rem;">${d.description}</p>` : ''}
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                            <div style="display: flex; flex-direction: column;">
                                <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Quantity</span>
                                <span style="font-weight: 700;">${d.quantity || 'N/A'}</span>
                            </div>
                            <div style="display: flex; flex-direction: column; text-align: right;">
                                <span style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Condition</span>
                                <span style="font-weight: 700; color: var(--primary-green);">${d.itemCondition || 'N/A'}</span>
                            </div>
                        </div>
                        <button onclick="claimDonation(${d.id}, this)" class="btn btn-secondary" style="width: 100%; justify-content: center; background-color: var(--primary-green);">
                            <i data-lucide="hand-heart"></i> Claim Donation
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        const claimDonation = async (id, btn) => {
            if (!confirm('Are you sure you want to claim this donation?')) return;
            btn.disabled = true;
            btn.textContent = 'Claiming...';
            try {
                const response = await fetch(`http://localhost:8080/api/donations/${id}/claim?ngoId=${currentUser.id}`, {
                    method: 'PUT'
                });
                if (response.ok) {
                    alert('Donation claimed successfully! Emails have been sent to the donor and admin.');
                    loadDonations();
                } else {
                    const err = await response.json();
                    alert('Failed to claim: ' + (err.message || 'Unknown error'));
                    btn.disabled = false;
                    btn.textContent = 'Claim Donation';
                }
            } catch (error) {
                alert('Could not connect to server.');
                btn.disabled = false;
                btn.textContent = 'Claim Donation';
            }
        };

        const filterDonations = () => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('categoryFilter').value;
            const filtered = allDonations.filter(d => {
                const matchSearch = !search ||
                    (d.title && d.title.toLowerCase().includes(search)) ||
                    (d.pickupAddress && d.pickupAddress.toLowerCase().includes(search));
                const matchCat = !cat || d.category === cat;
                return matchSearch && matchCat;
            });
            renderDonations(filtered);
        };

        const loadDonations = async () => {
            const grid = document.getElementById('donationsGrid');
            grid.innerHTML = '<p style="color: var(--text-muted);">Loading donations...</p>';
            try {
                const res = await fetch('http://localhost:8080/api/donations/available');
                allDonations = await res.json();
                filterDonations();
            } catch (err) {
                grid.innerHTML = '<p style="color: red;">Failed to load donations. Is the backend running?</p>';
            }
        };

        document.getElementById('searchInput').addEventListener('input', filterDonations);
        document.getElementById('categoryFilter').addEventListener('change', filterDonations);

        loadDonations();
    </script>
</body>
</html>
