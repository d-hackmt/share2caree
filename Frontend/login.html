<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | ShareToCare</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-main);">
    <div class="card animate-fade-in" style="width: 100%; max-width: 450px; padding: 2.5rem;">
      <div style="text-align: center; margin-bottom: 2rem;">
        <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">ShareTo<span>Care</span></a>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">Welcome back! Please login to your account.</p>
      </div>

      <div id="errorMsg" style="display:none; background:#fee2e2; color:#dc2626; padding:0.875rem 1rem; border-radius:var(--radius-md); margin-bottom:1rem; font-size:0.875rem;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input id="email" type="email" class="form-control" placeholder="name@example.com" required />
        </div>
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <label class="form-label">Password</label>
          </div>
          <input id="password" type="password" class="form-control" placeholder="••••••••" required />
        </div>

        <div class="form-group">
          <label class="form-label">Continue as</label>
          <select id="role" class="form-control">
            <option value="DONOR">Donor (Individual/Company)</option>
            <option value="NGO">NGO (Charity Organization)</option>
            <option value="ADMIN">Administrator</option>
          </select>
        </div>

        <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
          Login to Dashboard
        </button>
      </form>

      <div style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
        <p style="color: var(--text-muted); font-size: 0.875rem;">
          Don't have an account?
          <a href="register-donor.html" style="color: var(--primary-blue); font-weight: 600;">Register as Donor</a>
          &nbsp;|&nbsp;
          <a href="register-ngo.html" style="color: var(--primary-green); font-weight: 600;">Register as NGO</a>
        </p>
      </div>
    </div>

    <script>
      lucide.createIcons();

      const showError = (msg) => {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
      };

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        document.getElementById('errorMsg').style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const selectedRole = document.getElementById('role').value;
        const btn = document.getElementById('loginBtn');

        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
          const response = await fetch('http://localhost:8080/user/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (!response.ok) {
            showError(data.message || 'Login failed. Please try again.');
            btn.disabled = false;
            btn.textContent = 'Login to Dashboard';
            return;
          }

          if (data.role !== selectedRole) {
            showError(`This account is registered as ${data.role.toLowerCase()}. Please select the correct role.`);
            btn.disabled = false;
            btn.textContent = 'Login to Dashboard';
            return;
          }

          localStorage.setItem('currentUser', JSON.stringify(data));

          if (data.role === 'DONOR') window.location.href = 'donor/dashboard.html';
          else if (data.role === 'NGO') window.location.href = 'ngo/dashboard.html';
          else window.location.href = 'admin/verify-ngos.html';

        } catch (error) {
          showError('Could not connect to server. Is the backend running?');
          btn.disabled = false;
          btn.textContent = 'Login to Dashboard';
        }
      });
    </script>
  </body>
</html>
