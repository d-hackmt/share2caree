<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGO Verification | Admin | ShareToCare</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1rem; background: var(--bg-main); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }
        td { padding: 1.25rem 1rem; border-bottom: 1px solid var(--border-color); font-size: 0.875rem; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
    </style>
</head>

<body style="background-color: var(--bg-main);">
    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="../index.html" class="logo" style="margin-bottom: 2.5rem; padding: 0 1rem;">ShareTo<span>Care</span></a>
            <nav style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                <a href="verify-ngos.html" class="btn" style="background: var(--primary-blue-light); color: var(--primary-blue); justify-content: flex-start;">
                    <i data-lucide="shield-check"></i> Verify NGOs
                </a>
                <a href="donations.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="package"></i> All Donations
                </a>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <a href="../login.html" onclick="localStorage.clear()" class="btn" style="justify-content: flex-start; color: #ef4444; width: 100%;">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2.5rem;">
                <h1 style="font-size: 1.875rem;">NGO Verification Queue</h1>
                <p style="color: var(--text-muted);">Review licenses and approve or reject organization registration requests.</p>
            </header>

            <div class="card" style="padding: 0; overflow: hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>NGO Name</th>
                            <th>Email</th>
                            <th>Phone</th>
                            <th>License</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ngoTableBody">
                        <tr><td colspan="6" style="text-align:center; color: var(--text-muted); padding: 2rem;">Loading NGOs...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'ADMIN') {
            window.location.href = '../login.html';
        }

        const loadNgos = async () => {
            const tbody = document.getElementById('ngoTableBody');
            try {
                const res = await fetch('http://localhost:8080/user/ngos');
                const ngos = await res.json();

                if (!ngos.length) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--text-muted); padding: 2rem;">No NGOs registered yet.</td></tr>';
                    return;
                }

                tbody.innerHTML = ngos.map(ngo => {
                    const isPending = ngo.ngoStatus === 'PENDING';
                    const isApproved = ngo.ngoStatus === 'APPROVED';
                    const licenseCell = ngo.licenseFile
                        ? `<a href="http://localhost:8080/user/license/${ngo.licenseFile}" target="_blank"
                              style="color: var(--primary-blue); font-weight: 600; text-decoration: underline; white-space: nowrap;">
                              View License
                           </a>`
                        : `<span style="color: var(--text-muted);">Not uploaded</span>`;
                    return `
                    <tr>
                        <td style="font-weight: 600;">${ngo.name}</td>
                        <td>${ngo.email}</td>
                        <td>${ngo.phone || '-'}</td>
                        <td>${licenseCell}</td>
                        <td>
                            <span class="badge ${isApproved ? 'badge-available' : isPending ? 'badge-pending' : ''}"
                                  style="${!isApproved && !isPending ? 'background:#fee2e2;color:#ef4444;' : ''}">
                                ${ngo.ngoStatus}
                            </span>
                        </td>
                        <td>
                            ${isPending ? `
                                <div style="display:flex; gap: 0.5rem;">
                                    <button onclick="updateNgo(${ngo.id}, 'approve', this)" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; background-color: var(--primary-green);">Approve</button>
                                    <button onclick="updateNgo(${ngo.id}, 'reject', this)" class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.75rem; border-color: #ef4444; color: #ef4444;">Reject</button>
                                </div>
                            ` : `<span style="color: var(--text-muted); font-size: 0.8rem;">${isApproved ? 'Approved' : 'Rejected'}</span>`}
                        </td>
                    </tr>
                    `;
                }).join('');
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: red; padding: 2rem;">Failed to load NGOs. Is the backend running?</td></tr>';
            }
        };

        const updateNgo = async (id, action, btn) => {
            btn.disabled = true;
            try {
                const res = await fetch(`http://localhost:8080/user/ngos/${id}/${action}`, { method: 'PUT' });
                if (res.ok) {
                    loadNgos();
                } else {
                    alert('Action failed. Please try again.');
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Could not connect to server.');
                btn.disabled = false;
            }
        };

        loadNgos();
    </script>
</body>
</html>
