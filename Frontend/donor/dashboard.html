<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Dashboard | ShareToCare</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="background-color: var(--bg-main);">
    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="../index.html" class="logo" style="margin-bottom: 2.5rem; padding: 0 1rem;">ShareTo<span>Care</span></a>
            <nav style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                <a href="dashboard.html" class="btn" style="background: var(--primary-blue-light); color: var(--primary-blue); justify-content: flex-start;">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="add-donation.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="plus-circle"></i> Add Donation
                </a>
                <a href="my-donations.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="package"></i> My Donations
                </a>
                <a href="history.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="history"></i> History
                </a>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <a href="../login.html" onclick="localStorage.clear()" class="btn" style="justify-content: flex-start; color: #ef4444; width: 100%;">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                <div>
                    <h1 style="font-size: 1.875rem;">Welcome, <span id="donorName">...</span>!</h1>
                    <p style="color: var(--text-muted);">Here's what's happening with your donations.</p>
                </div>
                <a href="add-donation.html" class="btn btn-primary">
                    <i data-lucide="plus"></i> New Donation
                </a>
            </header>

            <!-- Summary Cards -->
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2.5rem;">
                <div class="card" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <span style="color: var(--text-muted); font-size: 0.875rem; font-weight: 600;">Total Donations</span>
                    <span id="statTotal" style="font-size: 2rem; font-weight: 800;">-</span>
                </div>
                <div class="card" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <span style="color: var(--primary-green); font-size: 0.875rem; font-weight: 600;">Available</span>
                    <span id="statAvailable" style="font-size: 2rem; font-weight: 800;">-</span>
                </div>
                <div class="card" style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <span style="color: var(--primary-blue); font-size: 0.875rem; font-weight: 600;">Claimed by NGOs</span>
                    <span id="statClaimed" style="font-size: 2rem; font-weight: 800;">-</span>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="card">
                <h3 style="margin-bottom: 1.5rem;">Recent Activity</h3>
                <div id="recentActivity">
                    <p style="color: var(--text-muted);">Loading...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'DONOR') {
            window.location.href = '../login.html';
        }

        document.getElementById('donorName').textContent = currentUser.name || 'Donor';

        const formatDate = (dt) => {
            if (!dt) return '';
            return new Date(dt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        const loadStats = async () => {
            try {
                const res = await fetch(`http://localhost:8080/api/donations/donor/${currentUser.id}`);
                const donations = await res.json();

                const available = donations.filter(d => d.status === 'AVAILABLE').length;
                const claimed = donations.filter(d => d.status === 'CLAIMED').length;

                document.getElementById('statTotal').textContent = donations.length;
                document.getElementById('statAvailable').textContent = available;
                document.getElementById('statClaimed').textContent = claimed;

                const activityDiv = document.getElementById('recentActivity');
                if (!donations.length) {
                    activityDiv.innerHTML = '<p style="color: var(--text-muted);">No donations yet. <a href="add-donation.html" style="color: var(--primary-blue);">Add your first donation.</a></p>';
                    return;
                }

                const recent = donations.slice(-5).reverse();
                activityDiv.innerHTML = recent.map(d => `
                    <div style="display: flex; align-items: center; gap: 1rem; padding: 0.75rem 0; border-bottom: 1px solid var(--border-color);">
                        <div style="width: 36px; height: 36px; border-radius: 50%; background: ${d.status === 'CLAIMED' ? 'var(--primary-green-light)' : 'var(--primary-blue-light)'}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            <i data-lucide="${d.status === 'CLAIMED' ? 'check' : 'package'}" style="color: ${d.status === 'CLAIMED' ? 'var(--primary-green)' : 'var(--primary-blue)'};"></i>
                        </div>
                        <div style="flex: 1;">
                            <p style="font-weight: 600; margin: 0;">${d.title || 'Donation'} &mdash; <span style="color: ${d.status === 'CLAIMED' ? 'var(--primary-green)' : 'var(--primary-blue)'};">${d.status}</span></p>
                            <p style="color: var(--text-muted); font-size: 0.8rem; margin: 0;">${d.category || ''} &bull; ${formatDate(d.createdAt)}</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                document.getElementById('recentActivity').innerHTML = '<p style="color: red;">Failed to load data.</p>';
            }
        };

        loadStats();
    </script>
</body>
</html>
