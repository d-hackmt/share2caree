<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation History | ShareToCare</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 0.875rem 1rem; background: var(--bg-main); color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; font-weight: 700; }
        td { padding: 1rem; border-bottom: 1px solid var(--border-color); font-size: 0.875rem; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
    </style>
</head>

<body style="background-color: var(--bg-main);">
    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="../index.html" class="logo" style="margin-bottom: 2.5rem; padding: 0 1rem;">ShareTo<span>Care</span></a>
            <nav style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                <a href="dashboard.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="add-donation.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="plus-circle"></i> Add Donation
                </a>
                <a href="my-donations.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="package"></i> My Donations
                </a>
                <a href="history.html" class="btn" style="background: var(--primary-blue-light); color: var(--primary-blue); justify-content: flex-start;">
                    <i data-lucide="history"></i> History
                </a>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <a href="../login.html" onclick="localStorage.clear()" class="btn" style="justify-content: flex-start; color: #ef4444; width: 100%;">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2.5rem;">
                <h1 style="font-size: 1.875rem;">Donation History</h1>
                <p style="color: var(--text-muted);">Complete record of all your donations and their current status.</p>
            </header>

            <div class="card" style="padding: 0; overflow: hidden;">
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Category</th>
                            <th>Quantity</th>
                            <th>Pickup Address</th>
                            <th>Date Posted</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <tr><td colspan="6" style="text-align:center; color: var(--text-muted); padding: 2rem;">Loading history...</td></tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'DONOR') {
            window.location.href = '../login.html';
        }

        const formatDate = (dt) => {
            if (!dt) return '-';
            return new Date(dt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        const loadHistory = async () => {
            const tbody = document.getElementById('historyBody');
            try {
                const res = await fetch(`http://localhost:8080/api/donations/donor/${currentUser.id}`);
                const donations = await res.json();

                if (!donations.length) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: var(--text-muted); padding: 2rem;">No donations yet. <a href="add-donation.html" style="color: var(--primary-blue);">Post your first donation.</a></td></tr>';
                    return;
                }

                tbody.innerHTML = donations.map(d => `
                    <tr>
                        <td style="font-weight: 600;">${d.title || 'Untitled'}</td>
                        <td>${d.category || '-'}</td>
                        <td>${d.quantity || '-'}</td>
                        <td style="max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${d.pickupAddress || ''}">${d.pickupAddress || '-'}</td>
                        <td>${formatDate(d.createdAt)}</td>
                        <td><span class="badge ${d.status === 'AVAILABLE' ? 'badge-available' : 'badge-claimed'}">${d.status}</span></td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color: red; padding: 2rem;">Failed to load history. Is the backend running?</td></tr>';
            }
        };

        loadHistory();
    </script>
</body>
</html>
