<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Donations | ShareToCare</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="background-color: var(--bg-main);">
    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="../index.html" class="logo" style="margin-bottom: 2.5rem; padding: 0 1rem;">ShareTo<span>Care</span></a>
            <nav style="display: flex; flex-direction: column; gap: 0.5rem; flex: 1;">
                <a href="dashboard.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </a>
                <a href="add-donation.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="plus-circle"></i> Add Donation
                </a>
                <a href="my-donations.html" class="btn" style="background: var(--primary-blue-light); color: var(--primary-blue); justify-content: flex-start;">
                    <i data-lucide="package"></i> My Donations
                </a>
                <a href="history.html" class="btn" style="justify-content: flex-start; color: var(--text-muted);">
                    <i data-lucide="history"></i> History
                </a>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border-color);">
                <a href="../login.html" onclick="localStorage.clear()" class="btn" style="justify-content: flex-start; color: #ef4444; width: 100%;">
                    <i data-lucide="log-out"></i> Logout
                </a>
            </div>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                <div>
                    <h1 style="font-size: 1.875rem;">My Donations</h1>
                    <p style="color: var(--text-muted);">All items you have listed for donation.</p>
                </div>
                <a href="add-donation.html" class="btn btn-primary">
                    <i data-lucide="plus"></i> New Donation
                </a>
            </header>

            <div id="donationsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
                <p style="color: var(--text-muted);">Loading your donations...</p>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.role !== 'DONOR') {
            window.location.href = '../login.html';
        }

        const categoryIcon = (cat) => {
            if (!cat) return 'package';
            const c = cat.toUpperCase();
            if (c === 'FOOD') return 'apple';
            if (c === 'CLOTHES') return 'shirt';
            if (c === 'BOOKS') return 'book-open';
            return 'package';
        };

        const formatDate = (dt) => {
            if (!dt) return '';
            return new Date(dt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        };

        const loadDonations = async () => {
            const grid = document.getElementById('donationsGrid');
            try {
                const res = await fetch(`http://localhost:8080/api/donations/donor/${currentUser.id}`);
                const donations = await res.json();

                if (!donations.length) {
                    grid.innerHTML = '<p style="color: var(--text-muted);">You have not posted any donations yet. <a href="add-donation.html" style="color: var(--primary-blue);">Add your first donation.</a></p>';
                    return;
                }

                grid.innerHTML = donations.map(d => `
                    <div class="card" style="padding: 0; overflow: hidden; position: relative;">
                        <span class="badge ${d.status === 'AVAILABLE' ? 'badge-available' : 'badge-claimed'}" style="position: absolute; top: 1rem; right: 1rem;">${d.status}</span>
                        <div style="height: 160px; background: #f1f5f9; display: flex; align-items: center; justify-content: center;">
                            <i data-lucide="${categoryIcon(d.category)}" style="width: 48px; height: 48px; color: var(--text-muted);"></i>
                        </div>
                        <div style="padding: 1.25rem;">
                            <h3 style="margin-bottom: 0.5rem; font-size: 1.125rem;">${d.title || 'Untitled Donation'}</h3>
                            <div style="display: flex; gap: 1rem; font-size: 0.875rem; color: var(--text-muted); margin-bottom: 0.5rem;">
                                <span style="display: flex; align-items: center; gap: 0.25rem;"><i data-lucide="tag" size="14"></i> ${d.category || 'General'}</span>
                                <span style="display: flex; align-items: center; gap: 0.25rem;"><i data-lucide="box" size="14"></i> ${d.quantity || 'N/A'}</span>
                            </div>
                            <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.25rem;">
                                <i data-lucide="map-pin" size="14"></i> ${d.pickupAddress || 'No address'}
                            </p>
                            <p style="font-size: 0.75rem; color: var(--text-muted);">Posted: ${formatDate(d.createdAt)}</p>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                grid.innerHTML = '<p style="color: red;">Failed to load donations. Is the backend running?</p>';
            }
        };

        loadDonations();
    </script>
</body>
</html>
