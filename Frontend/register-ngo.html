<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as NGO | ShareToCare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body
    style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-main); padding: 2rem 0;">
    <div class="card animate-fade-in" style="width: 100%; max-width: 650px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo"
                style="justify-content: center; font-size: 2rem;">ShareTo<span>Care</span></a>
            <h2 style="margin-top: 1rem; color: var(--primary-green);">NGO Registration</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Join as a verified NGO to claim and distribute
                donations.</p>
        </div>

        <form action="#" onsubmit="event.preventDefault(); window.location.href='login.html';">
            <h3
                style="font-size: 1.125rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                Organization Details</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label class="form-label">NGO Name</label>
                    <input type="text" class="form-control" placeholder="Giving Hands Foundation" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Registration ID</label>
                    <input type="text" class="form-control" placeholder="NGO-XXXX-XXXX" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Official Email</label>
                <input type="email" class="form-control" placeholder="contact@ngo.org" required>
            </div>

            <h3
                style="font-size: 1.125rem; margin-top: 1.5rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">
                Verification Documents</h3>
            <div class="form-group">
                <label class="form-label">Upload NGO License (PDF/Image)</label>
                <input type="file" class="form-control">
                <small style="color: var(--text-muted);">Please upload the registration certificate of your
                    organization.</small>
            </div>

            <div class="form-group">
                <label class="form-label">Create Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-secondary"
                style="width: 100%; justify-content: center; margin-top: 1rem; background-color: var(--primary-green);">
                Submit for Verification
            </button>
        </form>

        <div
            style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.875rem;">
                Already have an account?
                <a href="login.html" style="color: var(--primary-blue); font-weight: 600;">Login here</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
