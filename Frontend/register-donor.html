<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Donor | ShareToCare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body
    style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-main);">
    <div class="card animate-fade-in" style="width: 100%; max-width: 550px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo"
                style="justify-content: center; font-size: 2rem;">ShareTo<span>Care</span></a>
            <h2 style="margin-top: 1rem;">Create Donor Account</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Start sharing your kindness with the world.</p>
        </div>

        <form action="#" onsubmit="event.preventDefault(); window.location.href='login.html';">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="form-control" placeholder="+91 XXXXX XXXXX" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; justify-content: center; margin-top: 1rem;">
                Create Account
            </button>
        </form>

        <div
            style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.875rem;">
                Looking to register as an NGO?
                <a href="register-ngo.html" style="color: var(--primary-green); font-weight: 600;">Register NGO here</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.querySelector('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                name: e.target.querySelector('input[placeholder="John Doe"]').value,
                email: e.target.querySelector('input[type="email"]').value,
                mobile: e.target.querySelector('input[type="tel"]').value,
                password: e.target.querySelector('input[placeholder="••••••••"]').value,
                role: 'DONOR'
            };

            const confirmPassword = e.target.querySelectorAll('input[type="password"]')[1].value;
            if (data.password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Registration successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    const err = await response.text();
                    alert('Registration failed: ' + err);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Backend not running? Please check console.');
            }
        });
    </script>
</body>

</html>
