<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Donor | ShareToCare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/location-picker.js"></script>
    <!-- Replace YOUR_API_KEY with your actual Google Maps API Key -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initMap" async defer></script>
    <script>
        function initMap() {
            initLocationPicker('map', 'locationSearch', 'lat', 'lng');
        }
    </script>
</head>

<body
    style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-main);">
    <div class="card animate-fade-in" style="width: 100%; max-width: 550px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" class="logo"
                style="justify-content: center; font-size: 2rem;">ShareTo<span>Care</span></a>
            <h2 style="margin-top: 1rem;">Create Donor Account</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Start sharing your kindness with the world.</p>
        </div>

        <form>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="john@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Mobile Number</label>
                <input type="tel" class="form-control" placeholder="+91 XXXXX XXXXX" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="form-control" style="display: none;"></div> <!-- Spacer -->

            <div class="location-section">
                <label class="form-label">Your Location</label>
                <div class="search-container">
                    <i data-lucide="map-pin" class="search-icon"></i>
                    <input type="text" id="locationSearch" class="form-control" placeholder="Search your address...">
                    <button type="button" class="btn btn-location" onclick="getCurrentLocation('lat', 'lng')" title="Use my current location">
                        <i data-lucide="locate"></i>
                    </button>
                </div>
                <div id="map" class="map-container"></div>
                <input type="hidden" id="lat" required>
                <input type="hidden" id="lng" required>
                <small style="color: var(--text-muted); margin-top: 0.5rem; display: block;">
                    Drag the pin or click on the map to refine your location.
                </small>
            </div>

            <button type="submit" class="btn btn-primary"
                style="width: 100%; justify-content: center; margin-top: 1rem;">
                Create Account
            </button>
        </form>

        <div
            style="margin-top: 2rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <p style="color: var(--text-muted); font-size: 0.875rem;">
                Looking to register as an NGO?
                <a href="register-ngo.html" style="color: var(--primary-green); font-weight: 600;">Register NGO here</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        document.querySelector('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = {
                name: e.target.querySelector('input[placeholder="John Doe"]').value,
                email: e.target.querySelector('input[type="email"]').value,
                phone: e.target.querySelector('input[type="tel"]').value,
                password: e.target.querySelector('input[placeholder="••••••••"]').value,
                latitude: parseFloat(document.getElementById('lat').value),
                longitude: parseFloat(document.getElementById('lng').value),
                role: 'DONOR'
            };

            if (!data.latitude || !data.longitude) {
                alert("Please select a location on the map.");
                return;
            }

            const confirmPassword = e.target.querySelectorAll('input[type="password"]')[1].value;
            if (data.password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/user/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Registration successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    const err = await response.text();
                    alert('Registration failed: ' + err);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Backend not running? Please check console.');
            }
        });
    </script>
</body>

</html>
