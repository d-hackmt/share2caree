<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Donor | ShareToCare</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/location-picker.js"></script>

    <!-- Google Maps -->
    <script src="https://maps.googleapis.com/maps/api/js?key=&libraries=places&callback=initMap" async defer></script>

    <script>
        function initMap() {
            initLocationPicker('map', 'locationSearch', 'lat', 'lng');
        }
    </script>
</head>

<body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--bg-main);">

<div class="card animate-fade-in" style="width: 100%; max-width: 550px; padding: 2.5rem;">

    <div style="text-align: center; margin-bottom: 2rem;">
        <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">
            ShareTo<span>Care</span>
        </a>
        <h2 style="margin-top: 1rem;">Create Donor Account</h2>
        <p style="color: var(--text-muted); margin-top: 0.5rem;">
            Start sharing your kindness with the world.
        </p>
    </div>

    <form id="registerForm">

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input id="name" type="text" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input id="email" type="email" class="form-control" placeholder="john@example.com" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Mobile Number</label>
            <input id="phone" type="tel" class="form-control" placeholder="+91 XXXXX XXXXX" required>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input id="password" type="password" class="form-control" placeholder="••••••••" required>
        </div>

        <!-- ✅ ADDED CONFIRM PASSWORD -->
        <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input id="confirmPassword" type="password" class="form-control" placeholder="Confirm Password" required>
        </div>

        <div class="location-section">
            <label class="form-label">Your Location</label>

            <div class="search-container">
                <i data-lucide="map-pin" class="search-icon"></i>
                <input type="text" id="locationSearch" class="form-control" placeholder="Search your address...">

                <button type="button" class="btn btn-location"
                    onclick="getCurrentLocation('lat', 'lng')"
                    title="Use my current location">
                    <i data-lucide="locate"></i>
                </button>
            </div>

            <div id="map" class="map-container"></div>

            <input type="hidden" id="lat" required>
            <input type="hidden" id="lng" required>

            <small style="color: var(--text-muted); margin-top: 0.5rem; display: block;">
                Drag the pin or click on the map to refine your location.
            </small>
        </div>

        <button type="submit" class="btn btn-primary"
            style="width: 100%; justify-content: center; margin-top: 1rem;">
            Create Account
        </button>

    </form>

</div>

<script>
lucide.createIcons();

document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        password: document.getElementById('password').value,
        latitude: parseFloat(document.getElementById('lat').value),
        longitude: parseFloat(document.getElementById('lng').value),
        role: 'DONOR'
    };

    const confirmPassword = document.getElementById('confirmPassword').value;

    if (isNaN(data.latitude) || isNaN(data.longitude)) {
        alert("Please select a location on the map.");
        return;
    }

    if (data.password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
    }

    console.log("Sending:", data);

    try {
        const response = await fetch('http://localhost:8080/user/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            alert('Registration successful!');
            window.location.href = 'login.html';
        } else {
            const err = await response.text();
            alert('Registration failed: ' + err);
        }
    } catch (error) {
        console.error(error);
        alert('Backend not running?');
    }
});
</script>

</body>
</html>
